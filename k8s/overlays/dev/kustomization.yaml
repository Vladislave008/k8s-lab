apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/resources.yaml
  - path: patches/affinity.yaml
  - path: patches/storage.yaml
  - path: patches/ingress-host.yaml

replicas:
  - name: user-service
    count: 1
  - name: message-service
    count: 1
  - name: bff
    count: 1
  - name: frontend
    count: 1

images:
  - name: mablinov2704/user-service
    newTag: latest
  - name: mablinov2704/message-service
    newTag: latest
  - name: mablinov2704/bff
    newTag: latest
  - name: mablinov2704/frontend
    newTag: latest