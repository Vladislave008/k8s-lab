apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/resources.yaml
    target:
      kind: Deployment
      name: .*
  - path: patches/affinity.yaml
    target:
      kind: Deployment
      name: .*
  - path: patches/storage.yaml
    target:
      kind: PersistentVolumeClaim
      name: .*
  - path: patches/ingress-host.yaml
    target:
      kind: Ingress
      name: .*

replicas:
  - name: user-service
    count: 3
  - name: message-service
    count: 3
  - name: bff
    count: 3
  - name: frontend
    count: 2

images:
  - name: mablinov2704/user-service
    newTag: stable
  - name: mablinov2704/message-service
    newTag: stable
  - name: mablinov2704/bff
    newTag: stable
  - name: mablinov2704/frontend
    newTag: stable